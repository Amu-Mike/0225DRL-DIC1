<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike Lee | Personal Page</title>
    <meta name="description" content="Personal portfolio and workspace of Mike Lee. Featuring real-time updates and modern design.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <section class="glass-card fade-in">
            <div class="profile-header">
                <div class="profile-image-container">
                    <img src="mike_lee_profile.png" alt="Mike Lee" id="profile-img">
                </div>
                <div class="profile-info">
                    <h1 class="name">Mike Lee</h1>
                    <p class="tagline">Creative Technologist & Visionary</p>
                </div>
            </div>

            <div class="clock-section">
                <div class="time-label">Current Local Time</div>
                <div id="clock" class="digital-clock">00:00:00</div>
                <div id="date" class="date-display">Wednesday, February 25, 2026</div>
            </div>

            <div class="content-grid">
                <div class="grid-item">
                    <h3>Focus</h3>
                    <p>Building meaningful digital experiences through clean code and elegant design.</p>
                </div>
                <div class="grid-item">
                    <h3>Status</h3>
                    <p class="pulse-text"><span class="status-dot"></span> Available for collaboration</p>
                </div>
            </div>

            <div class="social-links">
                <a href="#" class="btn secondary">Portfolio</a>
                <a href="#" class="btn primary">Connect</a>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
